<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA & DevOps Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #222; color: #fff; text-align: center; padding: 50px; }
        .card { background-color: #333; padding: 20px; border-radius: 8px; display: inline-block; margin-top: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        #status { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>GitUps!!!</h1>
    <p>Статус подключения к API бэкенда:</p>
    
    <div class="card">
        <p id="loading">Загрузка данных с бэкенда...</p>
        <p id="response" style="display: none;">Ответ: <span id="status"></span></p>
    </div>

    <script>
        // В будущем Kubernetes Ingress свяжет фронт и бек на одном домене, 
        // поэтому запрос делаем по относительному пути /api/status
        fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('response').style.display = 'block';
                document.getElementById('status').innerText = data.message;
            })
            .catch(err => {
                document.getElementById('loading').innerText = "Ошибка подключения к бэкенду!";
                console.error(err);
            });
    </script>
</body>
</html>
