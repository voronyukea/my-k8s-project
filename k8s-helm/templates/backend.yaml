apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-backend
  namespace: my-app
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: my-backend
  template:
    metadata:
      labels:
        app: my-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.repository }}:{{ .Values.backend.tag }}"
          ports:
            - containerPort: {{ .Values.backend.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: my-backend-service
  namespace: my-app
spec:
  selector:
    app: my-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: {{ .Values.backend.port }}